version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: curriculofit
      POSTGRES_PASSWORD: senha123
      POSTGRES_DB: curriculofit
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U curriculofit']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '3333:3333'
    environment:
      DATABASE_URL: postgresql://curriculofit:senha123@postgres:5432/curriculofit
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-jwt-secret-mude-em-producao-32chars
      REFRESH_TOKEN_SECRET: dev-refresh-secret-mude-em-producao
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_IN: 7d
      PORT: 3333
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

volumes:
  postgres_data:
