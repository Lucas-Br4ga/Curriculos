name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — Lint + Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: curriculofit
          POSTGRES_PASSWORD: senha123
          POSTGRES_DB: curriculofit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://curriculofit:senha123@localhost:5432/curriculofit_test

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --testPathPattern="unit" --coverage
        env:
          DATABASE_URL: postgresql://curriculofit:senha123@localhost:5432/curriculofit_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-ok
          REFRESH_TOKEN_SECRET: ci-refresh-secret-at-least-32-chars
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
          NODE_ENV: test

      - name: Integration tests
        run: npm test -- --testPathPattern="integration"
        env:
          DATABASE_URL: postgresql://curriculofit:senha123@localhost:5432/curriculofit_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-jwt-secret-at-least-32-characters-ok
          REFRESH_TOKEN_SECRET: ci-refresh-secret-at-least-32-chars
          JWT_EXPIRES_IN: 15m
          REFRESH_TOKEN_EXPIRES_IN: 7d
          NODE_ENV: test

  frontend-build:
    name: Frontend — Lint + Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.curriculofit.com.br

  deploy:
    name: Deploy
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via Railway + Vercel webhooks
        run: echo "Deploy triggered via GitHub integration"
